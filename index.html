<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso primeiro site</title>
    <link rel="stylesheet" href="etilo.css">
</head>

<body>
    <header>
        <h1>Meu blog</h1>
        <p>Vou compatilhar conhecimento com você</p>
        <img src="https://www.neymarjr.com/pt/futebol" alt="imagem um">
    </header>
    <main></main>
    <h2>Meu primeiro post</h2>
    <p>Por GABRIEL</p>
    <p>Boa vindas ao meu Blog, aqui vou compartilhar dicas com você</p>
    <button>✅ <span>0</span></button>
    <button>👎 <span>0</span></button>
    <button>🙃 <span>0</span></button>
    </main>

</body>
<script>
    const botoes = document.querySelectorAll("button");
    botoes.forEach(function (botao) {
        botao.addEventListener("click", botaoClidado);
        function botaoClidado() {
            let texto = botao.querySelector("span");
            texto.textContent++;
        }

    })

</script>

</html>
